<svg xmlns="http://www.w3.org/2000/svg" width="800" height="560" viewBox="0 0 800 560">
  <rect width="800" height="560" rx="28" fill="{{ .Brand.Background }}"/>
  <rect x="32" y="32" width="736" height="84" rx="18" fill="{{ .Brand.PrimaryColor }}"/>
  <text x="64" y="84" fill="#ffffff" font-family="Arial, sans-serif" font-size="30" font-weight="700">{{ .Data.titulo }}</text>
  {{ range $i, $prod := .Data.produtos }}
  <g transform="translate(48, {{ add 144 (mul $i 78) }})">
    <rect width="704" height="64" rx="14" fill="#f8f9fb" stroke="#eef0f3"/>
    <circle cx="34" cy="32" r="20" fill="{{ $.Brand.PrimaryColor }}"/>
    <text x="34" y="39" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="16" font-weight="700">{{ add $i 1 }}</text>
    <text x="72" y="29" fill="{{ $.Brand.TextColor }}" font-family="Arial, sans-serif" font-size="19" font-weight="700">{{ $prod.nome }}</text>
    <text x="72" y="50" fill="{{ $.Brand.MutedColor }}" font-family="Arial, sans-serif" font-size="14">{{ stockStatus $prod.estoque_status }}</text>
    <text x="676" y="40" text-anchor="end" fill="{{ $.Brand.PrimaryColor }}" font-family="Arial, sans-serif" font-size="22" font-weight="700">{{ formatCurrency $prod.preco }}{{ formatUnit $prod.unidade }}</text>
  </g>
  {{ end }}
</svg>
