<svg xmlns="http://www.w3.org/2000/svg" width="800" height="520" viewBox="0 0 800 520">
  <rect width="800" height="520" rx="28" fill="{{ .Brand.Background }}"/>
  <rect x="32" y="32" width="736" height="92" rx="18" fill="#00897b"/>
  <text x="400" y="88" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="30" font-weight="700">Pagamento via PIX</text>
  <rect x="90" y="166" width="188" height="188" rx="18" fill="#ffffff" stroke="#eef0f3" stroke-width="4"/>
  <rect x="122" y="198" width="44" height="44" fill="{{ .Brand.TextColor }}"/>
  <rect x="202" y="198" width="44" height="44" fill="{{ .Brand.TextColor }}"/>
  <rect x="122" y="278" width="44" height="44" fill="{{ .Brand.TextColor }}"/>
  <rect x="190" y="266" width="20" height="20" fill="{{ .Brand.TextColor }}"/>
  <rect x="224" y="300" width="22" height="22" fill="{{ .Brand.TextColor }}"/>
  <text x="326" y="210" fill="{{ .Brand.MutedColor }}" font-family="Arial, sans-serif" font-size="16">Valor</text>
  <text x="326" y="258" fill="{{ .Brand.PrimaryColor }}" font-family="Arial, sans-serif" font-size="46" font-weight="700">{{ formatCurrency .Data.valor }}</text>
  {{ if .Data.numero_pedido }}<text x="326" y="296" fill="{{ .Brand.TextColor }}" font-family="Arial, sans-serif" font-size="18">Pedido #{{ .Data.numero_pedido }}</text>{{ end }}
  <text x="326" y="326" fill="{{ .Brand.MutedColor }}" font-family="Arial, sans-serif" font-size="16">Valido por {{ if .Data.expiracao }}{{ .Data.expiracao }}{{ else }}30 minutos{{ end }}</text>
  <rect x="56" y="392" width="688" height="70" rx="14" fill="#f8f9fb" stroke="#eef0f3"/>
  <text x="76" y="422" fill="{{ .Brand.MutedColor }}" font-family="Arial, sans-serif" font-size="13">Codigo copia e cola</text>
  <text x="76" y="448" fill="{{ .Brand.TextColor }}" font-family="monospace" font-size="15">{{ truncate .Data.pix_payload 82 }}</text>
</svg>
