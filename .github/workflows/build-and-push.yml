name: build-and-push

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      tag:
        description: Override image tag
        required: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  ORG: integrall-tech

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            context: .
            dockerfile: Dockerfile
            image: linktor-backend
          - name: admin
            context: web/admin
            dockerfile: web/admin/Dockerfile
            image: linktor-admin
            build_args: |
              NEXT_PUBLIC_API_URL=https://api.linktor.dev/api/v1
              NEXT_PUBLIC_WS_URL=wss://api.linktor.dev/api/v1/ws
              NEXT_PUBLIC_WEBHOOK_BASE_URL=https://api.linktor.dev
          - name: landing
            context: web/landing
            dockerfile: web/landing/Dockerfile
            image: linktor-landing

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: tags
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.ORG }}/${{ matrix.image }}"
          TAGS=""
          if [[ -n "${{ github.event.inputs.tag }}" ]]; then
            TAGS="$IMAGE:${{ github.event.inputs.tag }}"
          elif [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAGS="$IMAGE:${GITHUB_REF#refs/tags/},$IMAGE:latest"
          else
            TAGS="$IMAGE:latest,$IMAGE:sha-${GITHUB_SHA::7}"
          fi
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"
          echo "primary=${TAGS%%,*}" >> "$GITHUB_OUTPUT"

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64
          tags: ${{ steps.tags.outputs.tags }}
          build-args: ${{ matrix.build_args }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,scope=${{ matrix.name }},mode=max
          provenance: false

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    uses: ./.github/workflows/deploy.yml
    secrets: inherit
    with:
      image_tag: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || format('sha-{0}', github.sha) }}
