http:
  middlewares:
    security-headers:
      headers:
        frameDeny: true
        contentTypeNosniff: true
        browserXssFilter: true
        referrerPolicy: strict-origin-when-cross-origin
        stsSeconds: 31536000
        stsIncludeSubdomains: true
        stsPreload: true
        customResponseHeaders:
          X-Robots-Tag: "noindex, nofollow"
          Server: ""
          X-Powered-By: ""
        permissionsPolicy: "camera=(), microphone=(), geolocation=()"
        contentSecurityPolicy: ""

    rate-limit:
      rateLimit:
        average: 100
        burst: 200
        period: 1s
        sourceCriterion:
          ipStrategy:
            depth: 1

    rate-limit-strict:
      rateLimit:
        average: 10
        burst: 20
        period: 1s
        sourceCriterion:
          ipStrategy:
            depth: 1

    www-redirect:
      redirectRegex:
        regex: "^https://www\\.(.+)"
        replacement: "https://${1}"
        permanent: true

    dashboard-auth:
      basicAuth:
        usersFile: /etc/traefik/dynamic/dashboard.htpasswd
        removeHeader: true

    compress:
      compress: {}
